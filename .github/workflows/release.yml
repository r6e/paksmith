name: Release

# release-please opens release PRs from conventional commits on main.
# Merging the release PR re-triggers this workflow; release-please
# creates the tag + GitHub Release, and `build-release` uploads
# per-platform binaries via output-chain (same workflow run).
#
# release-please uses an App-minted token (PR creation, downstream-
# workflow trigger). build-release uses GITHUB_TOKEN for asset upload.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a release-PR update mid-flight

permissions:
  # Workflow-level grant to the default GITHUB_TOKEN. `contents: write`
  # is used by build-release's `gh release upload`. release-please's
  # PR/tag/release creation goes through the App token instead — no
  # `pull-requests: write` on GITHUB_TOKEN needed.
  contents: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # `releases_created` (plural) is the always-emitted top-level
      # boolean. The singular `release_created` is ONLY emitted when
      # a package sits at repo root `.`, which paksmith doesn't have
      # (all three packages live under crates/) — so the singular form
      # would always be empty, silently skipping build-release forever.
      # `tag_name` uses the cli path's per-path output; linked-versions
      # keeps all three at the same version, so any path works.
      release_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs['crates/paksmith-cli--tag_name'] }}
    steps:
      # Mints a 1h installation token via the `paksmith-release-please`
      # App (installed on this repo only). The App token unblocks PR
      # creation (which GITHUB_TOKEN can't do here) and lets the
      # release tag trigger downstream workflows for any future split-
      # workflow design (e.g. Issue #166's crates.io publish).
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

  build-release:
    name: build-release (${{ matrix.target }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write # `gh release upload`
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 (glibc 2.35) for broader downstream compat —
          # ubuntu-latest is 24.04 with glibc 2.39 which breaks on
          # Debian stable / RHEL 8-9 / older Ubuntu LTS.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build release binaries
        run: cargo build --release --locked -p paksmith-cli -p paksmith-gui
      - name: Stage archive contents (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
        run: |
          staging="paksmith-${TAG}-${TARGET}"
          mkdir -p "${staging}"
          cp target/release/paksmith "${staging}/"
          cp target/release/paksmith-gui "${staging}/"
          cp LICENSE README.md "${staging}/"
          tar czf "${staging}.tar.gz" "${staging}"
          shasum -a 256 "${staging}.tar.gz" > "SHA256SUMS-${TARGET}.txt"
      - name: Stage archive contents (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $staging = "paksmith-${env:TAG}-${env:TARGET}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item target/release/paksmith.exe -Destination $staging
          Copy-Item target/release/paksmith-gui.exe -Destination $staging
          Copy-Item LICENSE, README.md -Destination $staging
          Compress-Archive -Path $staging -DestinationPath "${staging}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "${staging}.zip").Hash.ToLower()
          # Issue #167: LF (not CRLF) for `sha256sum -c --strict` on Linux.
          [System.IO.File]::WriteAllText("$pwd/SHA256SUMS-${env:TARGET}.txt", "${hash}  ${staging}.zip`n")
      # `gh release upload --clobber` so a workflow retry overwrites
      # prior uploads instead of erroring on duplicate asset name. No
      # new action publisher needed (gh CLI ships on the runner).
      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        shell: bash
        run: |
          archive="paksmith-${TAG}-${TARGET}.${ARCHIVE_EXT}"
          checksums="SHA256SUMS-${TARGET}.txt"
          gh release upload "${TAG}" "${archive}" "${checksums}" --clobber
