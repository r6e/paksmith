name: Mutation Testing

# Runs on every PR. The `changes` job decides whether the diff touches
# parsing-relevant code; non-matching PRs skip-as-success so this can
# safely become a required check without deadlocking docs-only PRs.
# (Bare `paths:` filters produce no run at all, leaving required checks
# pending forever — see ci.yml `changes` job and PR #152 for that trap.)
# `--in-diff` keeps each matching run scoped to the changed lines, and
# the mutant list is split across a `--shard` matrix so wall-clock is
# roughly (single-job time / SHARD_COUNT) + one baseline build per
# shard (~1 min). The `mutants` aggregator is the single stable
# status; point any future required-check entry at it, never at the
# per-shard jobs.
on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Keep this filter in sync with the parser surface — a missing entry
  # silently skips mutation testing for that path. The scope is narrower
  # than ci.yml's `code` filter (parser crates only, not the full
  # workspace), but the gating mechanism is identical.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      parser: ${{ steps.filter.outputs.parser }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            parser:
              - 'crates/paksmith-core/**'
              - 'crates/paksmith-core-tests/**'
              # Workspace root manifest only — per-crate manifests for
              # paksmith-core* are already covered by the globs above;
              # cli/gui/fixture-gen manifest edits shouldn't burn a
              # cargo-mutants baseline build.
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/mutants.yml'

  # Each shard tests every 4th mutant of the deterministic
  # (`--no-shuffle`) mutant list — collectively exhaustive, no
  # overlap. Changing the shard count means updating BOTH the matrix
  # list and the `/4` denominators below (name + --shard argument);
  # they cannot reference a shared constant in Actions syntax.
  shard:
    name: cargo-mutants shard (${{ matrix.shard }}/4)
    needs: changes
    if: needs.changes.outputs.parser == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      # One shard's miss must not cancel the others — every shard's
      # outcome is diagnostic signal.
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    env:
      # Mutated builds routinely produce warnings (the mutation IS the
      # divergence). `-D warnings` would mask the mutation signal.
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history needed for `git diff` against the PR base.
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@c93ccc03e00cd0e08e494f5fd058a6c55a6a1907 # v2.82.8
        with:
          tool: cargo-mutants
      # Bind base ref via env so the value cannot be interpolated into
      # shell — even though base_ref is a GitHub-provided branch name,
      # the env-var pattern is what the security guide recommends for
      # any github.event.* field reaching `run:`.
      - name: Compute PR diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git diff "origin/${BASE_REF}" -- > /tmp/pr.diff
      # `--in-diff` scopes mutation testing to the lines changed in the
      # PR (massive speedup vs whole-workspace mutation). `--no-shuffle`
      # gives stable order across runs — load-bearing for sharding:
      # shards partition the ORDERED list, so a shuffled order would
      # break the every-4th-mutant partition's determinism. `-j 2`
      # parallelism is conservative — bump if jobs are I/O-bound on a
      # given runner. `--all-features` matches CI's full test invocation
      # so mutations on `__test_utils`-gated code and the
      # `paksmith-core-tests` integration suite are validated against
      # the same surface CI runs (per CLAUDE.md: default `cargo test`
      # misses these).
      - name: Run cargo-mutants shard on PR diff
        run: |
          cargo mutants \
            --in-diff /tmp/pr.diff \
            --no-shuffle \
            -j 2 \
            --all-features \
            --shard ${{ matrix.shard }}/4
      # cargo-mutants writes per-outcome lists to mutants.out/{caught,
      # missed,timeout,unviable}.txt. The `missed.txt` set is the only
      # actionable signal — those are mutations that survived the test
      # suite, indicating tests that compile but don't actually assert
      # the invariant. Counts give a quick gut-check; full lists live in
      # the per-shard uploaded artifact.
      - name: Summarize results
        if: always()
        shell: bash
        run: |
          {
            echo "### Mutation testing (shard ${{ matrix.shard }}/4)"
            echo ""
            if [ -d mutants.out ]; then
              echo "| Outcome | Count |"
              echo "| --- | --- |"
              for kind in caught missed timeout unviable; do
                f="mutants.out/${kind}.txt"
                count=0
                if [ -f "$f" ]; then count=$(wc -l < "$f" | tr -d ' '); fi
                echo "| ${kind} | ${count} |"
              done
              if [ -s mutants.out/missed.txt ]; then
                echo ""
                echo "### Missed mutants"
                echo '```'
                cat mutants.out/missed.txt
                echo '```'
              fi
            else
              echo "No mutants.out directory produced — see uploaded artifact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutants-results-shard-${{ matrix.shard }}
          path: mutants.out/
          retention-days: 30

  # Single stable status joining the shard matrix. Carries the exact
  # name the pre-shard workflow's one job had, so dashboards, branch
  # rules, and any future ruleset entry keep one durable identity.
  # Preserves skip-as-success: a parser-untouched PR (shards skipped)
  # passes; a failed `changes` gate or any shard failure fails.
  mutants:
    name: cargo-mutants (PR diff)
    needs: [changes, shard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate shard results
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          SHARD_RESULT: ${{ needs.shard.result }}
        run: |
          echo "changes: ${CHANGES_RESULT}, shards: ${SHARD_RESULT}"
          if [ "${CHANGES_RESULT}" != "success" ]; then
            echo "changes gate did not succeed"; exit 1
          fi
          case "${SHARD_RESULT}" in
            success|skipped) exit 0 ;;
            *) echo "one or more shards failed"; exit 1 ;;
          esac
