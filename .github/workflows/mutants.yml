name: Mutation Testing

# Runs on every PR. The `changes` job decides whether the diff touches
# parsing-relevant code; non-matching PRs skip-as-success so this can
# safely become a required check without deadlocking docs-only PRs.
# (Bare `paths:` filters produce no run at all, leaving required checks
# pending forever — see ci.yml `changes` job and PR #152 for that trap.)
# `--in-diff` keeps each matching run scoped to the changed lines, so
# wall-clock stays in the single-minute range.
on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Keep this filter in sync with the parser surface — a missing entry
  # silently skips mutation testing for that path. The scope is narrower
  # than ci.yml's `code` filter (parser crates only, not the full
  # workspace), but the gating mechanism is identical.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      parser: ${{ steps.filter.outputs.parser }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            parser:
              - 'crates/paksmith-core/**'
              - 'crates/paksmith-core-tests/**'
              # Workspace root manifest only — per-crate manifests for
              # paksmith-core* are already covered by the globs above;
              # cli/gui/fixture-gen manifest edits shouldn't burn a
              # cargo-mutants baseline build.
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/mutants.yml'

  mutants:
    name: cargo-mutants (PR diff)
    needs: changes
    if: needs.changes.outputs.parser == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Mutated builds routinely produce warnings (the mutation IS the
      # divergence). `-D warnings` would mask the mutation signal.
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history needed for `git diff` against the PR base.
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
        with:
          tool: cargo-mutants
      # Bind base ref via env so the value cannot be interpolated into
      # shell — even though base_ref is a GitHub-provided branch name,
      # the env-var pattern is what the security guide recommends for
      # any github.event.* field reaching `run:`.
      - name: Compute PR diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: git diff "origin/${BASE_REF}" -- > /tmp/pr.diff
      # `--in-diff` scopes mutation testing to the lines changed in the
      # PR (massive speedup vs whole-workspace mutation). `--no-shuffle`
      # gives stable order across runs (easier to compare). `-j 2`
      # parallelism is conservative — bump if jobs are I/O-bound on a
      # given runner. `--all-features` matches CI's full test invocation
      # so mutations on `__test_utils`-gated code and the
      # `paksmith-core-tests` integration suite are validated against
      # the same surface CI runs (per CLAUDE.md: default `cargo test`
      # misses these).
      - name: Run cargo-mutants on PR diff
        run: |
          cargo mutants \
            --in-diff /tmp/pr.diff \
            --no-shuffle \
            -j 2 \
            --all-features \
            --output mutants.out
      # cargo-mutants writes per-outcome lists to mutants.out/{caught,
      # missed,timeout,unviable}.txt. The `missed.txt` set is the only
      # actionable signal — those are mutations that survived the test
      # suite, indicating tests that compile but don't actually assert
      # the invariant. Counts give a quick gut-check; full lists live in
      # the uploaded artifact.
      - name: Summarize results
        if: always()
        shell: bash
        run: |
          {
            echo "### Mutation testing"
            echo ""
            if [ -d mutants.out ]; then
              echo "| Outcome | Count |"
              echo "| --- | --- |"
              for kind in caught missed timeout unviable; do
                f="mutants.out/${kind}.txt"
                count=0
                if [ -f "$f" ]; then count=$(wc -l < "$f" | tr -d ' '); fi
                echo "| ${kind} | ${count} |"
              done
              if [ -s mutants.out/missed.txt ]; then
                echo ""
                echo "### Missed mutants"
                echo '```'
                cat mutants.out/missed.txt
                echo '```'
              fi
            else
              echo "No mutants.out directory produced — see uploaded artifact."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutants-results
          path: mutants.out/
          retention-days: 30
