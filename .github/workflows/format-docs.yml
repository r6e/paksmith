name: Format docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded PR runs so successive pushes don't pile up minutes.
# Pushes to main run to completion (group is keyed on ref;
# cancel-in-progress is PR-only).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Detect whether the PR/push touched docs-formats-shaped paths. The
  # `lint` job gates on this so PRs that don't touch the lint surface
  # skip-as-success (which satisfies required-status-checks under the
  # ruleset, unlike `paths`/`paths-ignore` which produces no run at all
  # and leaves required checks pending forever — see ci.yml's matching
  # pattern and `feedback_ci_job_rename_orphans_ruleset_check.md`).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            docs:
              - 'docs/formats/**'
              - 'crates/paksmith-doc-lint/**'
              - '.github/workflows/format-docs.yml'
              - '.github/actions/setup-rust/**'

  lint:
    name: Lint docs/formats/
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-rust
      - name: Build linter
        run: cargo build -p paksmith-doc-lint --release
      - name: Required-headings lint
        run: ./target/release/paksmith-doc-lint required-headings docs/formats/
      - name: Status-enum lint
        run: ./target/release/paksmith-doc-lint status-enum docs/formats/README.md
      - name: Inventory-files cross-check
        run: ./target/release/paksmith-doc-lint inventory-files docs/formats/README.md docs/formats
