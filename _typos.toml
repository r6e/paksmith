# crate-ci/typos config — allowlist domain terms that typos' default
# dictionary flags as misspellings. Keys are matched case-insensitively
# (so `UE` covers `UE`, `ue`, `Ue`); the value preserves the canonical
# form for any auto-correction the action might offer.

[files]
# Auto-generated release-please CHANGELOGs. Contents are commit
# subjects + Markdown links to GitHub commits/PRs; the short SHA-1
# prefixes (`ba40798`, `f529c9c`, etc.) collide with English-word
# heuristics — `ba` flags as "by"/"be", `f5` doesn't trip but
# similar 7-char hex prefixes can. We don't author CHANGELOG copy
# manually (the underlying commit messages are already validated
# by the PR-title gate), so spell-checking these is pure noise.
extend-exclude = ["CHANGELOG.md", "**/CHANGELOG.md"]

[default.extend-words]
# Unreal Engine abbreviation — flagged as "USE" / "DUE"
UE = "UE"
UE4 = "UE4"
UE5 = "UE5"

# Level Of Detail (UE / 3D-graphics term) — flagged as "LOAD"
LOD = "LOD"

# DEFLATE / inflate compression family — flagged as "flat"
flate = "flate"

# Prefix used in error messages (mis-aligned, mis-encoded, etc.)
mis = "mis"

# Past tense of "seek" — common in Read+Seek code; typos prefers "sought"
seeked = "seeked"

# `serde::ser::SerializeStruct` — serde's `ser` submodule. typos
# flags "ser" as a typo for "set".
ser = "ser"
