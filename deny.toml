[advisories]
# `unmaintained = "workspace"` scopes the unmaintained advisory check to direct
# workspace dependencies only (not transitive deps).  This consciously accepts
# the unmaintained gtk3-rs transitive tree that muda 0.19.x pulls in on Linux
# (atk / gdk / gtk / glib / pango / cairo crates, all unmaintained in favour of
# gtk4-rs).  The gtk3 path is dormant on macOS and Windows; on Linux iced 0.14
# exposes no window handle so the muda menu is never attached.  Removal
# condition: when muda moves its Linux backend to gtk4.
#
# NOTE: cargo-audit (the .github/workflows/audit.yml job) has no equivalent
# workspace-scoping option, so it mirrors this acceptance as an explicit per-ID
# `ignore:` list. Keep the two in sync: a newly accepted transitive advisory
# added here must also be added to that workflow's ignore list (and vice versa).
unmaintained = "workspace"
unsound = "all"
yanked = "warn"
ignore = [
    # RUSTSEC-2024-0429: unsoundness in glib::VariantStrIter.
    # Advisory is Linux-only (GTK dep; glib 0.18.x via muda → gtk).
    # Provable facts: (1) paksmith never calls glib::VariantStrIter anywhere in
    # its codebase; (2) on Linux, iced 0.14 exposes no window handle, so muda's
    # gtk menu attachment code is never executed — the gtk code path is dormant;
    # (3) the advisory is rated INFO/unsound and affects only VariantStrIter
    # iteration over attacker-controlled GLib Variant data, which paksmith does
    # not process (the menu strings are all compile-time constants).
    # Fixed in glib 0.20+; muda 0.19.x pins glib 0.18.x.  Remove this ignore
    # when muda bumps its gtk/glib dependency.
    { id = "RUSTSEC-2024-0429", reason = "paksmith never calls glib::VariantStrIter; Linux gtk path is dormant (iced 0.14 exposes no window handle); menu strings are compile-time constants with no attacker input; fixed in glib 0.20+ pending muda dep bump" },
]

[licenses]
# In cargo-deny 0.16+ the `unlicensed` and `copyleft` keys were removed;
# anything outside the explicit allow-list is denied by default.
allow = [
    "MIT",
    "Apache-2.0",
    # Used by alloc-no-stdlib + alloc-stdlib (transitive via brotli via
    # unreal_asset in paksmith-fixture-gen).
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
]

# Scoped license exceptions: licenses allowed only for the specific
# crate listed, never globally. Keeps the workspace allow-list above
# narrow while permitting legitimate vendored upstreams.
[[licenses.exceptions]]
# libfuzzer-sys vendors LLVM's libFuzzer runtime, which carries the
# NCSA license (OSI-approved, FSF-libre). The crate itself is dual-
# licensed MIT OR Apache-2.0; the NCSA term applies only to the
# bundled runtime. Required to run cargo-deny against the `fuzz/`
# workspace, which is the only place this dep appears.
name = "libfuzzer-sys"
allow = ["NCSA"]

# Symphonia (Phase 3f Vorbis decode for `OggHandler`) and its sub-crates are
# MPL-2.0 — weak, file-level copyleft. paksmith only *links* the crates (no
# modifications to their source), so the MPL obligation is not triggered; the
# permissive workspace allow-list stays narrow by scoping the exception to the
# specific symphonia crates the Ogg+Vorbis feature set pulls in.
[[licenses.exceptions]]
name = "symphonia"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "symphonia-core"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "symphonia-codec-vorbis"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "symphonia-format-ogg"
allow = ["MPL-2.0"]
[[licenses.exceptions]]
name = "symphonia-metadata"
allow = ["MPL-2.0"]
# symphonia 0.6 split shared internals into `symphonia-common` (was
# `symphonia-utils-xiph` in 0.5); same MPL-2.0, same link-only obligation.
[[licenses.exceptions]]
name = "symphonia-common"
allow = ["MPL-2.0"]

# option-ext is a transitive dep of `dirs` (via dirs-sys). It carries
# MPL-2.0; paksmith only links it (no modification), same link-only
# obligation as the symphonia exceptions above.
[[licenses.exceptions]]
name = "option-ext"
allow = ["MPL-2.0"]

# The reqwest rustls-tls stack (Phase 5c) pulls in four crates with licenses
# outside the global allow-list. All are permissive — scoped here per the
# project convention to keep the global list narrow.
#
# ring: TLS crypto backend (via rustls). The package declares "Apache-2.0 AND
# ISC"; Apache-2.0 is already globally allowed; ISC is added here scoped to
# ring only. ISC is a 2-clause permissive license, functionally equivalent to
# MIT — no copyleft obligation.
[[licenses.exceptions]]
name = "ring"
allow = ["ISC"]

# rustls-webpki: certificate path validation (via rustls). ISC — same
# permissive terms as the ring exception above.
[[licenses.exceptions]]
name = "rustls-webpki"
allow = ["ISC"]

# untrusted: zero-copy byte-slice parser used internally by ring/rustls-webpki.
# ISC — same permissive terms as above.
[[licenses.exceptions]]
name = "untrusted"
allow = ["ISC"]

# webpki-roots: Mozilla CA root certificate bundle for rustls. CDLA-Permissive-2.0
# (Community Data License Agreement — Permissive). This is a permissive data
# license for the bundled CA root list, not a code license; it imposes no
# copyleft or source-disclosure obligation on paksmith.
[[licenses.exceptions]]
name = "webpki-roots"
allow = ["CDLA-Permissive-2.0"]

# Phase 6 (iced GUI): iced's transitive dependency tree pulls in five crates
# with licenses outside the global allow-list. All are permissive — scoped here
# per the project convention to keep the global list narrow.
#
# arrayref: byte-slice reference helpers (via tiny-skia → iced_tiny_skia).
# BSD-2-Clause ("Simplified") — 2-clause permissive, OSI/FSF free.
[[licenses.exceptions]]
name = "arrayref"
allow = ["BSD-2-Clause"]

# clipboard-win: Windows clipboard access (via window_clipboard → iced_winit).
# BSL-1.0 (Boost Software License) — permissive, OSI/FSF free. No copyleft.
[[licenses.exceptions]]
name = "clipboard-win"
allow = ["BSL-1.0"]

# error-code: Win32 error code helper (transitive via clipboard-win).
# BSL-1.0 — same terms as clipboard-win above.
[[licenses.exceptions]]
name = "error-code"
allow = ["BSL-1.0"]

# hexf-parse: hexadecimal float literal parsing (via wgpu-core → iced_wgpu).
# CC0-1.0 — public domain dedication. No restrictions whatsoever.
[[licenses.exceptions]]
name = "hexf-parse"
allow = ["CC0-1.0"]

# libloading: dynamic library loading (via wgpu-hal → iced_wgpu on non-Windows).
# ISC — 2-clause permissive, functionally equivalent to MIT. Same as the ring /
# rustls-webpki / untrusted exceptions above.
[[licenses.exceptions]]
name = "libloading"
allow = ["ISC"]

# Phase 6 Task 11 (muda native menu bar): muda's Linux GTK backend pulls in two
# crates with licenses or advisories outside the global allow-list.
#
# target-lexicon: target triple parsing (via muda → gtk → atk-sys → glib-sys →
# system-deps → cfg-expr → target-lexicon).  Licensed Apache-2.0 WITH
# LLVM-exception — the LLVM exception grants additional permissions beyond
# plain Apache-2.0 (removes the patent-retaliation clause concern for LLVM
# toolchain users). Permissive; no copyleft obligation.
[[licenses.exceptions]]
name = "target-lexicon"
allow = ["Apache-2.0 WITH LLVM-exception"]

# BSD-2-Clause — a standard permissive OSI license (BSD-3-Clause minus the
# non-endorsement clause; BSD-3-Clause is already in the global allow-list).
# Pulled transitively by the `image` crate's EXIF support, which arrives via
# iced's `image-without-codecs` feature (Phase 7b TextureViewer renders raw
# RGBA via `Handle::from_rgba`; the codec tree is disabled). Scoped per-crate
# per the narrow-allow-list convention.
[[licenses.exceptions]]
name = "kamadak-exif"
allow = ["BSD-2-Clause"]
[[licenses.exceptions]]
name = "mutate_once"
allow = ["BSD-2-Clause"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# trumank/repak is opt-in dev-only (cross-parser ground-truth fixture
# generator and the Layer 1+2 cross-validation tests). The `repak` name
# on crates.io is squatted by an unrelated abandoned crate, so the
# actual library only ships via GitHub. Pinned by SHA in
# crates/paksmith-fixture-gen/Cargo.toml — the standalone crate excluded
# from the workspace's default-members so routine local builds skip it.
#
# AstroTechies/unrealmodding hosts the `unreal_asset` crate used as the
# Phase-2a uasset cross-parser oracle (Task 12). It IS published to
# crates.io as 0.1.16, but the sister crates (unreal_asset_base /
# unreal_asset_exports / unreal_asset_properties) are part of the same
# workspace and must move in lockstep — pinning by git SHA avoids the
# version-skew window crates.io's per-crate publication allows.
allow-git = [
    "https://github.com/trumank/repak",
    "https://github.com/AstroTechies/unrealmodding",
]
