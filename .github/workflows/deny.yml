name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

jobs:
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: cargo-deny (main workspace)
        uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        with:
          command: check all
          arguments: --all-features

      # The `fuzz/` workspace is a separate cargo workspace (own
      # Cargo.toml, own Cargo.lock) so the root invocation above does
      # not cover it. Without this gate, a fuzz-only dep with a
      # disallowed license/advisory/source would slip through review.
      # Sharing `deny.toml` keeps policy consistent across both
      # workspaces; the libfuzzer-sys NCSA exception lives there.
      - name: cargo-deny (fuzz workspace)
        uses: EmbarkStudios/cargo-deny-action@a531616d8ce3b9177443e48a1159bc945a099823 # v2.0.19
        with:
          command: check all
          arguments: --all-features
          manifest-path: fuzz/Cargo.toml
