# cargo-mutants configuration.
#
# `exclude_re` skips functions whose name/signature matches the regex
# from mutation testing. See https://mutants.rs/filter_mutants.html
# for the syntax. Regexes are unanchored substring matches against the
# full mutant description string (path + function + replacement); use
# `\b` word boundaries to avoid accidental sibling matches.
#
# Entries should be RARE — most mutants represent real test gaps and
# should be killed by adding a test, not silenced here. Every entry
# MUST document *why* the mutant cannot meaningfully be killed at the
# current point in time, and *when* the entry should be removed.

# Morton (Z-order) bit-spreading: `^` ⇄ `|` are EQUIVALENT here, so these
# mutants are mathematically unkillable, not test gaps. In `morton_code_2`
# (3e-VT-c2) each step is `x = (x ^ (x << k)) & mask`; the mask selects bit
# positions where `x` and `x << k` never both hold a 1, so XOR and OR yield
# identical output (the standard Morton-encode property — many implementations
# use `|`). The same holds for `render_tile`'s `morton_code_2(x) |
# (morton_code_2(y) << 1)`: the two operands occupy disjoint even/odd bits.
# The masks + the combine ARE exercised (morton_code_2_interleaves_into_even_bits
# + the flatten golden vectors); only the operator choice is free. These regexes
# match ONLY the `^`/`|` operator swaps (by replacement text), leaving every other
# mutant in those functions tested. Remove if `morton_code_2` is ever rewritten
# away from the spread-and-combine form.
# `config_base_dir`, ProfileStore::{config_path, load, save} are thin env/IO
# wrappers whose ONLY logic lives in already-unit-tested helpers; the top-level
# `Ok(default)` / `Ok(())` mutant lands on the un-testable seam, not on real behavior:
#   * `config_base_dir` = `config_base_dir_from_env(std::env::var_os("PAKSMITH_CONFIG_DIR"))`.
#     All path logic is in `config_base_dir_from_env`, unit-tested. What remains is
#     the `std::env::var_os` read — un-injectable without `unsafe set_var`.
#   * `config_path` = `config_path_from_env(std::env::var_os("PAKSMITH_CONFIG_DIR"))`.
#     All path logic (the `!is_empty` filter, the join, the NoConfigDir error) is
#     in `config_path_from_env`, unit-tested via `config_path_from_env_uses_non_empty_override`
#     and `config_path_from_env_empty_override_falls_through` (those mutants ARE
#     killed). What remains is the `std::env::var_os` read, which a core unit test
#     cannot vary because `std::env::set_var` is `unsafe` (forbidden by `-D unsafe-code`).
#   * `load` = `Self::load_from(&Self::config_path()?)` and `save` =
#     `self.save_to(&Self::config_path()?)`. The real work is in `load_from` /
#     `save_to` (unit-tested: load_missing_file_is_empty_store, save_then_load_roundtrips,
#     saved_file_is_0600, corrupt_store_is_typed_error, load_from_directory_is_typed_io_error)
#     and in `config_path` above. The wrappers only delegate + read the real config dir;
#     the CLI integration tests (paksmith-cli) exercise the full `load`/`save` round-trip,
#     but cargo-mutants scopes tests to the mutated package (paksmith-core), so those
#     cross-crate kills are not credited here.
# Match each mutant narrowly by function + replacement text. Remove these once an
# env-injection test seam (e.g. a `config_path_from_env`-style param threaded through
# `load`/`save`, or a test-only env override) lets a core unit test drive the wrapper.
#
# `write_restricted` has TWO cfg-gated definitions: `#[cfg(unix)]` (the real
# 0600-create-and-write) and `#[cfg(not(unix))]` (a plain `std::fs::write`
# fallback). cargo-mutants applies the source-text mutation to BOTH bodies, but
# on a unix host (local macOS AND Linux CI) the `#[cfg(not(unix))]` body is never
# compiled — so its `-> Ok(())` mutant builds, runs no tests against that body,
# and is scored MISSED (NOT unviable, because the cfg'd-out text still parses).
# That platform's body simply cannot be exercised on a unix runner. The unix
# body that DOES run is covered by `save_then_load_roundtrips` (a no-op write
# would leave the temp file empty/absent → rename fails or load mismatches) and
# `saved_file_is_0600`, so the regex dropping the (caught) unix variant too is
# safe — it is not masking a real gap. Remove when a non-unix CI runner exists
# to exercise the fallback.
exclude_re = [
    'replace \^ with \| in morton_code_2',
    'replace \| with \^ in render_tile',
    'replace config_base_dir -> Result<PathBuf, PaksmithError> with Ok\(Default::default\(\)\)',
    'replace ProfileStore::config_path -> Result<PathBuf, PaksmithError> with Ok\(Default::default\(\)\)',
    'replace ProfileStore::load -> Result<Self, PaksmithError> with Ok\(Default::default\(\)\)',
    'replace ProfileStore::save -> Result<\(\), PaksmithError> with Ok\(\(\)\)',
    'replace write_restricted -> std::io::Result<\(\)> with Ok\(\(\)\)',
    # RegistryCache::{path,load,save} are thin env/IO wrappers whose ONLY logic
    # lives in already-unit-tested helpers (load_from/save_to/config_base_dir):
    #   * `path` = `config_base_dir()?.join("registry-cache.json")`. The base-dir
    #     logic (env override vs platform dir) is in `config_base_dir_from_env`,
    #     unit-tested; the `std::env::var_os` read is the same un-injectable seam
    #     as ProfileStore::config_path (unsafe set_var, forbidden by -D unsafe-code).
    #   * `load` = `Self::load_from(&Self::path()?)`. Real work in `load_from`
    #     (unit-tested: save_then_load_roundtrips, load_missing_is_none,
    #     saved_cache_is_0600, corrupt_is_typed_error, load_re_applies_caps_to_untrusted_file).
    #     Cross-crate CLI integration tests exercise the full round-trip but are not
    #     credited in package-scoped mutant runs.
    #   * `save` = `self.save_to(&Self::path()?)`. Same delegation pattern.
    # Remove these once an env-injection seam lets a core unit test drive the wrappers.
    'replace RegistryCache::path -> Result<PathBuf, PaksmithError> with Ok\(Default::default\(\)\)',
    'replace RegistryCache::load -> Result<Option<Self>, PaksmithError> with Ok\(None\)',
    'replace RegistryCache::save -> Result<\(\), PaksmithError> with Ok\(\(\)\)',
    # RegistryConfig::load is a thin env/IO wrapper: reads the config file via
    # `config_base_dir()` (same un-injectable seam) and delegates to `from_toml_str`
    # (fully unit-tested: defaults_when_empty, overrides_parse, partial_override_defaults_the_rest,
    # corrupt_is_typed_error). The `Ok(Default::default())` mutant lands on the wrapper
    # delegation, not on the config-parsing or path-resolution logic.
    # Remove once an env-injection seam is threaded through `load`.
    'replace RegistryConfig::load -> Result<Self, PaksmithError> with Ok\(Default::default\(\)\)',
    # NOTE: RegistryClient's async methods need NO exclusions. The in-source
    # `#[cfg(test)] mod fetch_tests` in `registry.rs` runs under package-scoped
    # cargo-mutants (wiremock + tokio are dev-deps of paksmith-core), so every
    # surviving async mutant is killed by a test, and the rest are auto-dropped
    # as unviable. Verified by a scoped run (`cargo mutants -f
    # crates/paksmith-core/src/profile/registry.rs`): 38 mutants → 33 caught,
    # 5 unviable, 0 missed. Specifically:
    #   * `get_capped` body-cap `>` (==/</>=) AND accumulator `+` (-/*) are killed
    #     by `body_exactly_at_cap_is_accepted` (exactly MAX_BODY_BYTES accepted)
    #     + `oversized_body_is_rejected` (cap+1 rejected).
    #   * `get_capped -> Ok(vec![..])` whole-body mutants are killed by
    #     `fetch_verifies_and_parses` (an empty/garbage body fails sig/parse).
    #   * the scheme guard was extracted into the pure `scheme_permitted` helper;
    #     its `||`→`&&` (and `-> true`/`-> false`) mutants are killed by
    #     `scheme_permitted_matrix`. The `delete !` in `fetch` is killed by
    #     `http_url_is_rejected`.
    #   * `fetch`/`fetch_inner` (+ `validate_caps`/`parse_registry`/`net_err`)
    #     `-> Ok(Default::default())` are UNVIABLE (no `Default` impl) and dropped
    #     by cargo-mutants automatically — no exclude needed.
    # cargo-mutants does not generate a mutant for the `std::env::var_os(...)
    # .is_some()` read (it doesn't mutate `.is_some()`), so there is nothing to
    # silence there either.
    #
    # `decode_hex_32` uses `|| !chunk[1].is_ascii_hexdigit()` so that either
    # non-hex byte causes an early `return None`. Replacing `||` with `&&`
    # requires BOTH bytes to be non-hex before the early return fires. When only
    # the first byte is non-hex and the second is valid, the mutant falls through
    # to `u8::from_str_radix(chunk, 16)` which fails (the first byte is not hex),
    # returning `None` via `?` anyway — the same observable result. This makes
    # the `||`→`&&` swap behavior-equivalent for all reachable inputs: the
    # `from_str_radix` fallback re-validates the chunk regardless, so no test can
    # distinguish the two operators. Remove if the hex-loop is rewritten to avoid
    # the `from_str_radix` fallback.
    'replace \|\| with && in decode_hex_32',
]
