name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --workspace

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Regenerate all fixtures and verify byte-determinism
        # Runs both fixture generators (synthetic via generate.rs and
        # repak-based via gen_pak_fixtures.rs), then asserts no diff in
        # any tests/fixtures/*.pak. Catches the silent failure mode
        # where a generator (or its upstream dep) introduces
        # non-determinism — HashMap ordering, timestamps, RNG-keyed
        # iteration, etc. Matrixed across all three platforms because
        # cross-platform divergence (filesystem case, line endings) is
        # itself a real non-determinism vector this gate must catch.
        #
        # Pathspec is single-quoted so git's pathspec engine handles the
        # glob, not the shell — avoids shell-expansion mismatches across
        # platforms and works even if a fixture file is ever deleted.
        #
        # Both generators write atomically (tempfile + rename), so a
        # mid-write panic leaves prior committed bytes intact rather
        # than half-written ones that would slip past this gate.
        shell: bash
        run: |
          set -euo pipefail
          cargo run --quiet -p paksmith-core --example generate_fixtures
          cargo run --quiet -p paksmith-core --example gen_pak_fixtures
          if ! git diff --exit-code -- 'tests/fixtures/*.pak'; then
            echo "::error::Fixture generation is non-deterministic — regenerated fixtures differ from committed bytes."
            echo "::error::If this is unexpected, investigate whether the generator (or its upstream dep) introduced non-determinism."
            echo "::error::If a deliberate fixture update is needed, regenerate locally and commit the new bytes."
            exit 1
          fi
      - run: cargo test --workspace

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace --release

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
