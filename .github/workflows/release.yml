name: Release

# release-please opens release PRs from conventional commits on main.
# Merging the release PR re-triggers this workflow; this time
# release-please creates the tag + GitHub Release, and the
# `build-release` matrix uploads per-platform binaries to it.
#
# Authentication: release-please uses a GitHub-App-minted installation
# token (see the `app-token` step below). The default GITHUB_TOKEN
# can't create pull requests in this repo, and App tokens are more
# durable than PATs (installation-scoped, not user-tied, auto-rotated).
#
# Build-release uses `gh release upload` via GITHUB_TOKEN — same-
# workflow output chain means the build-release job runs in the same
# workflow run after release-please succeeds, with no cross-workflow
# trigger needed. The App token only authenticates release-please
# itself.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a release-PR update mid-flight

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # `releases_created` (plural) is the always-emitted top-level
      # boolean. The singular `release_created` is ONLY emitted when
      # a package sits at repo root `.`, which paksmith doesn't have
      # (all three packages live under crates/) — so the singular form
      # would always be empty, silently skipping build-release forever.
      # `tag_name` uses the cli path's per-path output; linked-versions
      # keeps all three at the same version, so any path works.
      release_created: ${{ steps.rp.outputs.releases_created }}
      tag_name: ${{ steps.rp.outputs['crates/paksmith-cli--tag_name'] }}
    steps:
      # Mint a short-lived (1h) installation access token via the
      # `paksmith-release-please` GitHub App. We use an App token
      # rather than the default `GITHUB_TOKEN` for two reasons:
      #   1. `GITHUB_TOKEN` cannot create pull requests in this repo
      #      (the "Allow GitHub Actions to create and approve pull
      #      requests" setting is intentionally off — App-scoped auth
      #      is more durable than the org-wide flag).
      #   2. App-token-created refs (tags, releases) DO trigger
      #      downstream workflows, whereas `GITHUB_TOKEN`-created refs
      #      do not. Currently moot for the build-release job below
      #      (same-workflow output chain), but future split-workflow
      #      designs (e.g. separate tag-triggered crates.io publish)
      #      don't need to retrofit auth.
      #
      # APP_CLIENT_ID is a repository variable (public, not a secret).
      # APP_PRIVATE_KEY is a repository secret containing the App's
      # PEM-encoded private key. Both are scoped to this repo only;
      # the GitHub App is installed only on r6e/paksmith.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

  build-release:
    name: build-release (${{ matrix.target }})
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: write # `gh release upload`
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 (glibc 2.35) for broader downstream compat —
          # ubuntu-latest is 24.04 with glibc 2.39 which breaks on
          # Debian stable / RHEL 8-9 / older Ubuntu LTS.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Build release binaries
        run: cargo build --release --locked -p paksmith-cli -p paksmith-gui
      - name: Stage archive contents (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
        run: |
          staging="paksmith-${TAG}-${TARGET}"
          mkdir -p "${staging}"
          cp target/release/paksmith "${staging}/"
          cp target/release/paksmith-gui "${staging}/"
          cp LICENSE README.md "${staging}/"
          tar czf "${staging}.tar.gz" "${staging}"
          shasum -a 256 "${staging}.tar.gz" > "SHA256SUMS-${TARGET}.txt"
      - name: Stage archive contents (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
        run: |
          $staging = "paksmith-${env:TAG}-${env:TARGET}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item target/release/paksmith.exe -Destination $staging
          Copy-Item target/release/paksmith-gui.exe -Destination $staging
          Copy-Item LICENSE, README.md -Destination $staging
          Compress-Archive -Path $staging -DestinationPath "${staging}.zip"
          $hash = (Get-FileHash -Algorithm SHA256 "${staging}.zip").Hash.ToLower()
          "${hash}  ${staging}.zip" | Out-File -Encoding ascii "SHA256SUMS-${env:TARGET}.txt"
      # `gh release upload --clobber` so a workflow retry overwrites
      # prior uploads instead of erroring on duplicate asset name. No
      # new action publisher needed (gh CLI ships on the runner).
      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        shell: bash
        run: |
          archive="paksmith-${TAG}-${TARGET}.${ARCHIVE_EXT}"
          checksums="SHA256SUMS-${TARGET}.txt"
          gh release upload "${TAG}" "${archive}" "${checksums}" --clobber
