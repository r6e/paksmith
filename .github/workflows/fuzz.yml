name: Fuzz

# Scheduled-only — actual fuzz runs do not gate PRs. The harness lives
# in fuzz/fuzz_targets/ and depends on paksmith-core via path-dep;
# changes that break the harness build are caught by the `fuzz_build`
# job in ci.yml (PR-time, build-only). Running the actual fuzzer on
# every PR would burn ~10 min per push for no additional signal.
#
# Nightly cron is offset from the CI baseline so runs don't pile up on
# the same runner-pool window: CI runs are user-triggered (random),
# audit runs at 7am UTC, CodeQL Monday 8am UTC. Fuzz runs at 4am UTC.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Per-target fuzz budget in seconds (default 600 = 10 min)."
        required: false
        default: "600"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false # never cancel a running fuzz job

permissions:
  contents: read

jobs:
  fuzz:
    name: cargo-fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    # 10 min budget per target + ~5 min for toolchain + build + corpus
    # prep + artifact upload. 25 min ceiling absorbs slow runners.
    timeout-minutes: 25
    # Crashes are findings, not workflow failures. `continue-on-error`
    # so a discovered crash uploads its artifact and the workflow
    # surfaces yellow (not red) — until baseline is established, red
    # would be noise.
    continue-on-error: true
    # Job-scoped `issues: write` so the `Alert on cmin failure` step
    # can open or update the deterministic regression issue (#204).
    # Scoped at job level (not workflow level) so other future jobs
    # in this workflow stay read-only by default.
    permissions:
      contents: read
      issues: write
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_pak_open]
    env:
      # libfuzzer instrumentation needs nightly; clear RUSTFLAGS so
      # workspace-wide `-D warnings` doesn't escalate nightly's
      # routine new lints into build failures.
      RUSTFLAGS: ""
      # Single source of truth for the cache key schema — referenced
      # by both Restore and Save steps. Rolling per-run-id; the
      # prefix variant is what `restore-keys` matches against.
      CORPUS_CACHE_KEY: fuzz-corpus-${{ matrix.target }}-${{ github.run_id }}
      CORPUS_CACHE_PREFIX: fuzz-corpus-${{ matrix.target }}-
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cargo-fuzz
      # Rolling per-run-id key (Actions caches are immutable per
      # key); `restore-keys` prefix grabs the newest prior entry. A
      # miss degrades cleanly to seed-only. Split from save so save
      # can run under `if: always()` and survive cargo-fuzz exit-
      # non-zero on crash discovery — the monolithic `actions/cache`
      # post-hook would skip it.
      - name: Restore evolved corpus
        id: restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: ${{ env.CORPUS_CACHE_KEY }}
          restore-keys: |
            ${{ env.CORPUS_CACHE_PREFIX }}
      # Seed corpus: starting from the 30 valid pak fixtures means the
      # fuzzer explores adversarial mutations of real structures
      # immediately, instead of spending the first ~5 min rediscovering
      # "pak files start with magic bytes." `cp -n` is no-clobber so a
      # re-run keeps any newly-discovered corpus entries from a prior
      # invocation.
      - name: Seed corpus from fixtures
        env:
          TARGET: ${{ matrix.target }}
        # `find -exec` instead of `cp tests/fixtures/*.pak …` so a
        # zero-match (future fixture relocation, generator failure)
        # exits 0 cleanly rather than passing a literal `*.pak` to
        # `cp` and failing the step. `-maxdepth 1` keeps us pinned to
        # the fixture directory.
        run: |
          mkdir -p "fuzz/corpus/${TARGET}"
          find tests/fixtures -maxdepth 1 -name '*.pak' -type f \
            -exec cp -n {} "fuzz/corpus/${TARGET}/" \;
      - name: Run cargo-fuzz
        # Step-level continue-on-error so a crash exit (non-zero from
        # cargo-fuzz) does NOT skip subsequent steps. The job-level
        # `continue-on-error` only controls how `needs.<job>.result`
        # propagates — it does not affect the in-job step cascade.
        # Without this, the `Minimize corpus` and `Save evolved
        # corpus` post-fuzz steps would be skipped on the most
        # valuable runs (those that found a crash).
        continue-on-error: true
        env:
          TARGET: ${{ matrix.target }}
          # workflow_dispatch input ("max_total_time") wins; cron uses
          # the literal 600. Defensive default in env keeps `${BUDGET}`
          # bound even if the action's input parsing is broken.
          BUDGET: ${{ inputs.max_total_time || '600' }}
        # Explicit limits matter:
        #   -max_total_time=$BUDGET    : overall fuzzing wall clock
        #   -timeout=60                : per-input timeout (kills hangs)
        #   -rss_limit_mb=2048         : libfuzzer kills the process at
        #                                this. Without it, an alloc-of-
        #                                doom would OOM-kill the
        #                                runner before libfuzzer
        #                                records it as a crash. The
        #                                pak code's MAX_UNCOMPRESSED_
        #                                ENTRY_BYTES (8 GiB) is way
        #                                above this; clamp here.
        #   -max_len=1048576           : 1 MiB ceiling on a single
        #                                input. Real pak files in the
        #                                fixture set are <= 30 KiB.
        # `--target x86_64-unknown-linux-gnu` overrides cargo-fuzz's
        # Linux default (`-linux-musl`). musl is statically-linked
        # libc and incompatible with the ASan instrumentation
        # cargo-fuzz injects; gnu is dynamically-linked. Same
        # override applied in the ci.yml `fuzz_build` job.
        run: |
          cargo fuzz run "${TARGET}" \
            --target x86_64-unknown-linux-gnu \
            -- \
            -max_total_time="${BUDGET}" \
            -timeout=60 \
            -rss_limit_mb=2048 \
            -max_len=1048576
      # Prune redundant inputs before caching — libfuzzer never
      # prunes on save. `-max_len` matches the run step so cmin
      # measures coverage at the same input-size envelope (otherwise
      # cmin's libfuzzer default of 4096 bytes silently over-prunes
      # large inputs). Exit code is captured so a silent cmin
      # regression (toolchain incompat, etc.) surfaces in the
      # workflow summary instead of going unnoticed.
      - name: Minimize corpus
        id: cmin
        if: always()
        env:
          TARGET: ${{ matrix.target }}
        run: |
          exit_code=0
          cargo fuzz cmin "${TARGET}" \
            --target x86_64-unknown-linux-gnu \
            -- \
            -max_len=1048576 \
            || exit_code=$?
          echo "exit=${exit_code}" >> "$GITHUB_OUTPUT"
      - name: Summarize results
        if: always()
        env:
          TARGET: ${{ matrix.target }}
          CMIN_EXIT: ${{ steps.cmin.outputs.exit || 'skipped' }}
          # `cache-matched-key` is non-empty on any restore (exact
          # key OR `restore-keys` prefix match), empty on true miss.
          # No decay over time as the corpus matures, unlike a
          # corpus-vs-fixture-count heuristic.
          CACHE_MATCH: ${{ steps.restore.outputs.cache-matched-key || '' }}
        shell: bash
        run: |
          artifacts=$(find "fuzz/artifacts/${TARGET}" -maxdepth 1 -type f 2>/dev/null | wc -l | tr -d ' ')
          corpus=$(find "fuzz/corpus/${TARGET}" -maxdepth 1 -type f 2>/dev/null | wc -l | tr -d ' ')
          [ -n "${CACHE_MATCH}" ] && restored="yes (${CACHE_MATCH})" || restored="no (cache miss)"
          {
            echo "### Fuzz target: ${TARGET}"
            echo "- Crashes/timeouts: ${artifacts}"
            echo "- Corpus size (post-cmin): ${corpus}"
            echo "- Corpus restored from cache: ${restored}"
            echo "- cmin exit code: ${CMIN_EXIT}"
          } >> "$GITHUB_STEP_SUMMARY"
      # Issue #204: surface non-zero cmin exits beyond the workflow
      # summary so a silent regression (toolchain incompat, harness
      # ABI drift) doesn't let the corpus grow unbounded for weeks.
      # Deterministic title for auto-dedup: re-runs comment on the
      # existing open issue instead of creating duplicates.
      #
      # `continue-on-error: true` because alert-posting is best-
      # effort — a GitHub API hiccup must not make the workflow red
      # (it's already best-effort via `continue-on-error` at the
      # job + cmin-step levels).
      #
      # All shell inputs flow through `env:` vars (CMIN_EXIT from
      # the cmin step output, TARGET from the matrix, RUN_URL from
      # github context) — none touch user-controlled fields, so no
      # injection surface.
      - name: Alert on cmin failure
        if: always() && steps.cmin.outputs.exit != '0' && steps.cmin.outputs.exit != ''
        continue-on-error: true
        env:
          TARGET: ${{ matrix.target }}
          CMIN_EXIT: ${{ steps.cmin.outputs.exit }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title="[fuzz] cmin regression detected (target: ${TARGET})"
          body=$(cat <<EOF
          The nightly fuzz workflow's \`cargo fuzz cmin\` step exited
          non-zero for target \`${TARGET}\`.

          - Exit code: \`${CMIN_EXIT}\`
          - Run: ${RUN_URL}
          - Target: \`${TARGET}\`

          A non-zero cmin typically indicates a toolchain incompat
          (nightly drift), harness ABI mismatch, or corpus poisoning.

          If the corpus is suspected poisoned, nuke the cache via:
          \`\`\`
          gh api -X DELETE \\
            "/repos/${REPO}/actions/caches?key=fuzz-corpus-${TARGET}-<run-id>"
          \`\`\`

          This issue is auto-managed by the fuzz workflow — re-runs
          comment here instead of opening duplicates. Close once
          investigated.
          EOF
          )
          # Search for an existing open issue with the exact
          # deterministic title. `--search` does substring matching;
          # post-filter with jq's `.title == "<exact>"` so a
          # similarly-named issue ("[fuzz] cmin regression…something
          # else") doesn't false-match.
          existing=$(gh issue list \
            --state open \
            --search "in:title \"${title}\"" \
            --json number,title \
            --jq ".[] | select(.title == \"${title}\") | .number" \
            | head -n 1)
          if [ -n "${existing}" ]; then
            echo "Commenting on existing issue #${existing}"
            gh issue comment "${existing}" --body "${body}"
          else
            echo "Creating new alert issue"
            gh issue create \
              --title "${title}" \
              --body "${body}" \
              --label "ci"
          fi
      # Paired with the restore step above; `if: always()` is what
      # preserves the corpus on cargo-fuzz crash exit. To nuke a
      # poisoned corpus, delete the cache entries for the target via
      # `gh api -X DELETE /repos/r6e/paksmith/actions/caches?key=fuzz-corpus-<target>-<run-id>`.
      - name: Save evolved corpus
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: ${{ env.CORPUS_CACHE_KEY }}
      # Artifact upload is complementary to the cache, not redundant:
      # `fuzz/artifacts/` (crash inputs) is the irreplaceable part —
      # the cache only persists the corpus, not findings. The corpus
      # copy here gives a 30-day offline snapshot for replaying a
      # specific run (vs the cache's rolling-newest semantics).
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: fuzz-${{ matrix.target }}-${{ github.run_id }}
          path: |
            fuzz/artifacts/
            fuzz/corpus/
          retention-days: 30
