name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs so successive pushes don't pile up matrix
# minutes. Pushes to main run to completion (group is keyed on ref;
# cancel-in-progress is PR-only).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      # See full matrix failures even when one OS fails, so platform-
      # specific bugs can be distinguished from cross-platform breakage.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - name: Regenerate all fixtures and verify byte-determinism
        # Runs both fixture generators (synthetic via the `generate_fixtures`
        # example in paksmith-core; repak-based via the `paksmith-fixture-gen`
        # crate), then asserts (a) the expected fixture count is on disk
        # and (b) `git diff` shows zero bytes changed in tests/fixtures/*.pak.
        #
        # Catches three silent failure modes:
        #   - Non-determinism: a generator (or its upstream dep) introduces
        #     ordering/timestamp/RNG-keyed variance. Caught by the diff.
        #   - Zero-write: a refactor accidentally empties the generator's
        #     fixture array. We `rm -f tests/fixtures/*.pak` BEFORE running
        #     the generators, so a generator that writes 0 files leaves
        #     the working tree missing fixtures that exist in HEAD —
        #     `git diff --exit-code` reports them as deleted and the gate
        #     fails. The post-run `find | wc -l` check is a belt-and-
        #     suspenders count assertion.
        #   - Mid-write panic: atomic-rename in both generators ensures
        #     a panic between truncation and rename leaves a sibling
        #     `.pak.tmp` rather than a half-written `.pak`. Combined with
        #     the pre-run rm, a partial-run regen still surfaces as a
        #     missing-file diff.
        #
        # Matrixed across all three platforms because cross-platform
        # divergence (filesystem case, line endings) is itself a real
        # non-determinism vector this gate must catch.
        #
        # Pathspec is single-quoted so git's pathspec engine handles the
        # glob, not the shell — avoids shell-expansion mismatches across
        # platforms and works even if a fixture file is ever deleted.
        shell: bash
        run: |
          set -euo pipefail
          # Wipe before generating so a zero-write generator leaves the
          # working tree missing fixtures (caught by `git diff` as
          # deleted) instead of silently passing on stale committed
          # bytes. The `-f` suppresses "no such file" if a previous run
          # was interrupted.
          rm -f tests/fixtures/*.pak
          cargo run --quiet -p paksmith-core --example generate_fixtures
          cargo run --quiet -p paksmith-fixture-gen
          # Expected: 1 synthetic (minimal_v6.pak) + 24 repak ground-truth
          # (real_v{3,6,7,8a,8b,9,10,11}_{minimal,multi,mixed_paths}.pak)
          # + 3 issue-#69 compressed (real_v{8a,8b,9}_compressed.pak)
          # + 2 issue-#90 v10+ compressed (real_v{10,11}_compressed.pak)
          # = 30.
          # The pre-run rm + this count assertion together catch zero-write
          # bugs that the diff alone would miss.
          expected=30
          actual=$(find tests/fixtures -maxdepth 1 -name '*.pak' -type f | wc -l | tr -d ' ')
          # Emit the gate's verdict to the job-summary panel so reviewers
          # can see what was checked without scrolling raw step logs.
          # Static labels only — no user-controlled content is interpolated.
          {
            echo "### Fixture determinism gate (${{ matrix.os }})"
            echo ""
            echo "| Check | Value |"
            echo "| --- | --- |"
            echo "| Expected fixture count | $expected |"
            echo "| Actual fixture count   | $actual |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$actual" != "$expected" ]; then
            echo "| Count match | mismatch |" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Fixture count mismatch: expected $expected .pak files in tests/fixtures/, found $actual."
            echo "::error::A generator likely wrote fewer fixtures than expected — investigate src/main.rs in paksmith-fixture-gen or generate.rs."
            exit 1
          fi
          echo "| Count match | ok |" >> "$GITHUB_STEP_SUMMARY"
          if ! git diff --exit-code -- 'tests/fixtures/*.pak'; then
            {
              echo "| Byte-determinism | diverged |"
              echo ""
              echo "Regenerated fixtures differ from committed bytes — generator is non-deterministic."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Fixture generation is non-deterministic — regenerated fixtures differ from committed bytes."
            echo "::error::If this is unexpected, investigate whether the generator (or its upstream dep) introduced non-determinism."
            echo "::error::If a deliberate fixture update is needed, regenerate locally and commit the new bytes."
            exit 1
          fi
          echo "| Byte-determinism | ok |" >> "$GITHUB_STEP_SUMMARY"
      # Issue #102: `--all-features` activates the `__test_utils`
      # feature so tests gated by it (e.g. cross-crate fixture
      # sharing) get exercised even when the self-dep feature
      # propagation chain is incomplete. Today only `paksmith-core`
      # has a `__test_utils` feature with a single self-dep, but
      # `--all-features` is cheap insurance against a future
      # workspace member adding `#[cfg(feature = "__test_utils")]`-
      # gated tests that don't propagate.
      - run: cargo test --workspace --all-features

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - run: cargo build --workspace --release

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      # `--all-targets` includes tests, examples, benches; `--all-features`
      # activates the `__test_utils` feature so lints in the test-utils
      # surface (`crates/paksmith-core/src/testing/`) are checked too.
      # Without these flags the default `cargo clippy --workspace` misses
      # those code paths — exactly the trap MEMORY.md's
      # `ghas_clippy_extra_lints.md` flagged.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
