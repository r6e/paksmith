name: Bug report
description: A bug that isn't a parsing fault — CLI/GUI issues, build failures, incorrect behavior outside the parser.
title: "bug: <one-line summary>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        If paksmith can't open a pak or asset file, crashes on one, or extracts the wrong contents, use the **Pak or asset file issue** template instead — it collects the format-specific fields needed to triage.

  - type: input
    id: version
    attributes:
      label: Paksmith version
      placeholder: "0.1.0 / abc1234"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - CLI (paksmith)
        - GUI (paksmith-gui)
        - Library (paksmith-core)
        - Build / tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include error messages or backtraces. Run with `RUST_BACKTRACE=1` for panics.
      render: text
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues for duplicates.
          required: true
