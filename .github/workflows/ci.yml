name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo check --workspace

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Regenerate all fixtures and verify byte-determinism
        # Runs both fixture generators (synthetic via the `generate_fixtures`
        # example in paksmith-core; repak-based via the `paksmith-fixture-gen`
        # crate), then asserts (a) the expected fixture count is on disk
        # and (b) `git diff` shows zero bytes changed in tests/fixtures/*.pak.
        #
        # Catches three silent failure modes:
        #   - Non-determinism: a generator (or its upstream dep) introduces
        #     ordering/timestamp/RNG-keyed variance. Caught by the diff.
        #   - Zero-write: a refactor accidentally empties the generator's
        #     fixture array, the generator exits cleanly with 0 fixtures
        #     written, and `git diff` sees no change (since old fixtures
        #     still exist on disk). Caught by the explicit count check.
        #   - Mid-write panic: atomic-rename in both generators ensures
        #     prior committed bytes stay intact rather than half-written
        #     replacements that would slip past the diff.
        #
        # Matrixed across all three platforms because cross-platform
        # divergence (filesystem case, line endings) is itself a real
        # non-determinism vector this gate must catch.
        #
        # Pathspec is single-quoted so git's pathspec engine handles the
        # glob, not the shell — avoids shell-expansion mismatches across
        # platforms and works even if a fixture file is ever deleted.
        shell: bash
        run: |
          set -euo pipefail
          cargo run --quiet -p paksmith-core --example generate_fixtures
          cargo run --quiet -p paksmith-fixture-gen
          # Expected: 1 synthetic (minimal_v6.pak) + 9 repak ground-truth
          # (real_v{3,6,7}_{minimal,multi,mixed_paths}.pak) = 10. If a
          # generator silently writes fewer, the diff check would pass on
          # the un-regenerated stale files and miss the bug.
          expected=10
          actual=$(find tests/fixtures -maxdepth 1 -name '*.pak' -type f | wc -l | tr -d ' ')
          if [ "$actual" != "$expected" ]; then
            echo "::error::Fixture count mismatch: expected $expected .pak files in tests/fixtures/, found $actual."
            echo "::error::A generator likely wrote fewer fixtures than expected — investigate src/main.rs in paksmith-fixture-gen or generate.rs."
            exit 1
          fi
          if ! git diff --exit-code -- 'tests/fixtures/*.pak'; then
            echo "::error::Fixture generation is non-deterministic — regenerated fixtures differ from committed bytes."
            echo "::error::If this is unexpected, investigate whether the generator (or its upstream dep) introduced non-determinism."
            echo "::error::If a deliberate fixture update is needed, regenerate locally and commit the new bytes."
            exit 1
          fi
      - run: cargo test --workspace

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace --release

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
