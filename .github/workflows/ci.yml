name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded PR runs so successive pushes don't pile up matrix
# minutes. Pushes to main run to completion (group is keyed on ref;
# cancel-in-progress is PR-only).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Detect whether the PR/push touched code-shaped paths. Downstream
  # compile/test jobs gate on this so docs-only PRs skip-as-success
  # (which satisfies required-status-checks under the ruleset, unlike
  # `paths-ignore` which produces no run and leaves required checks
  # pending forever — see PR #152 for that trap).
  #
  # The "code" filter is an inclusion list: any matched path triggers
  # the full matrix. Keep it in sync if a new top-level code path is
  # added — a missing entry results in tests not running for that
  # path, which would be a silent gap.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'tests/**'
              # fuzz/ doesn't exist yet but will be added in Tier 3b
              # (cargo-fuzz harnesses). Listing it now so a fuzz-only PR
              # doesn't silently skip the matrix when 3b lands.
              - 'fuzz/**'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'rustfmt.toml'
              - 'deny.toml'
              - '.config/**'
              - '.github/workflows/**'
              - '.github/actions/**'
              - '.githooks/**'

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    permissions:
      contents: read
      # dorny/test-reporter posts a check-run with the JUnit results.
      checks: write
    timeout-minutes: 20
    strategy:
      # See full matrix failures even when one OS fails, so platform-
      # specific bugs can be distinguished from cross-platform breakage.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: nextest
      - name: Regenerate all fixtures and verify byte-determinism
        # Runs both fixture generators (synthetic via the `generate_fixtures`
        # example in paksmith-core; repak-based via the `paksmith-fixture-gen`
        # crate), then asserts (a) the expected fixture count is on disk
        # and (b) `git diff` shows zero bytes changed in tests/fixtures/*.pak.
        #
        # Catches three silent failure modes:
        #   - Non-determinism: a generator (or its upstream dep) introduces
        #     ordering/timestamp/RNG-keyed variance. Caught by the diff.
        #   - Zero-write: a refactor accidentally empties the generator's
        #     fixture array. We `rm -f tests/fixtures/*.pak` BEFORE running
        #     the generators, so a generator that writes 0 files leaves
        #     the working tree missing fixtures that exist in HEAD —
        #     `git diff --exit-code` reports them as deleted and the gate
        #     fails. The post-run `find | wc -l` check is a belt-and-
        #     suspenders count assertion.
        #   - Mid-write panic: atomic-rename in both generators ensures
        #     a panic between truncation and rename leaves a sibling
        #     `.pak.tmp` rather than a half-written `.pak`. Combined with
        #     the pre-run rm, a partial-run regen still surfaces as a
        #     missing-file diff.
        #
        # Matrixed across all three platforms because cross-platform
        # divergence (filesystem case, line endings) is itself a real
        # non-determinism vector this gate must catch.
        #
        # Pathspec is single-quoted so git's pathspec engine handles the
        # glob, not the shell — avoids shell-expansion mismatches across
        # platforms and works even if a fixture file is ever deleted.
        shell: bash
        run: |
          set -euo pipefail
          # Wipe before generating so a zero-write generator leaves the
          # working tree missing fixtures (caught by `git diff` as
          # deleted) instead of silently passing on stale committed
          # bytes. The `-f` suppresses "no such file" if a previous run
          # was interrupted.
          rm -f tests/fixtures/*.pak
          cargo run --quiet -p paksmith-core --example generate_fixtures
          cargo run --quiet -p paksmith-fixture-gen
          # Expected: 1 synthetic (minimal_v6.pak) + 24 repak ground-truth
          # (real_v{3,6,7,8a,8b,9,10,11}_{minimal,multi,mixed_paths}.pak)
          # + 3 issue-#69 compressed (real_v{8a,8b,9}_compressed.pak)
          # + 2 issue-#90 v10+ compressed (real_v{10,11}_compressed.pak)
          # = 30.
          # The pre-run rm + this count assertion together catch zero-write
          # bugs that the diff alone would miss.
          expected=30
          actual=$(find tests/fixtures -maxdepth 1 -name '*.pak' -type f | wc -l | tr -d ' ')
          # Emit the gate's verdict to the job-summary panel so reviewers
          # can see what was checked without scrolling raw step logs.
          # Static labels only — no user-controlled content is interpolated.
          {
            echo "### Fixture determinism gate (${{ matrix.os }})"
            echo ""
            echo "| Check | Value |"
            echo "| --- | --- |"
            echo "| Expected fixture count | $expected |"
            echo "| Actual fixture count   | $actual |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$actual" != "$expected" ]; then
            echo "| Count match | mismatch |" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Fixture count mismatch: expected $expected .pak files in tests/fixtures/, found $actual."
            echo "::error::A generator likely wrote fewer fixtures than expected — investigate src/main.rs in paksmith-fixture-gen or generate.rs."
            exit 1
          fi
          echo "| Count match | ok |" >> "$GITHUB_STEP_SUMMARY"
          if ! git diff --exit-code -- 'tests/fixtures/*.pak'; then
            {
              echo "| Byte-determinism | diverged |"
              echo ""
              echo "Regenerated fixtures differ from committed bytes — generator is non-deterministic."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Fixture generation is non-deterministic — regenerated fixtures differ from committed bytes."
            echo "::error::If this is unexpected, investigate whether the generator (or its upstream dep) introduced non-determinism."
            echo "::error::If a deliberate fixture update is needed, regenerate locally and commit the new bytes."
            exit 1
          fi
          echo "| Byte-determinism | ok |" >> "$GITHUB_STEP_SUMMARY"
      # Issue #102: `--all-features` activates the `__test_utils`
      # feature so tests gated by it (e.g. cross-crate fixture
      # sharing) get exercised even when the self-dep feature
      # propagation chain is incomplete. Today only `paksmith-core`
      # has a `__test_utils` feature with a single self-dep, but
      # `--all-features` is cheap insurance against a future
      # workspace member adding `#[cfg(feature = "__test_utils")]`-
      # gated tests that don't propagate.
      #
      # nextest runs unit + integration tests in parallel and emits
      # JUnit XML at target/nextest/ci/junit.xml (configured in
      # .config/nextest.toml). Doctests are NOT covered by nextest
      # and must run separately via `cargo test --doc`.
      - name: Run tests (nextest)
        run: cargo nextest run --workspace --all-features --profile ci
      - name: Run doctests
        run: cargo test --workspace --all-features --doc
      # Publish JUnit results as a check-run with per-test annotations
      # surfaced inline on the PR's Files-changed tab.
      #
      # `if: always()` so failures still get a published report — the
      # whole point is to see the failure detail without scrolling
      # raw step logs. Reporter name includes ${{ matrix.os }} so the
      # three OS matrix entries publish three distinct check-runs.
      - name: Publish test report
        if: always()
        # The reporter is a presentation enhancement; never let it
        # block the job. PRs from forks get a read-only GITHUB_TOKEN
        # and the action will silently fail to post the check-run —
        # that's fine, the test step itself already reports pass/fail.
        continue-on-error: true
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Test report (${{ matrix.os }})
          path: target/nextest/ci/junit.xml
          reporter: java-junit
          # Fail-on-error false because the test step itself already
          # fails the job on test failures — the reporter is purely
          # for surfacing detail, not adding a second failure path.
          fail-on-error: false

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
      - run: cargo build --workspace --release

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      # `--all-targets` includes tests, examples, benches; `--all-features`
      # activates the `__test_utils` feature so lints in the test-utils
      # surface (`crates/paksmith-core/src/testing/`) are checked too.
      # Without these flags the default `cargo clippy --workspace` misses
      # those code paths — exactly the trap MEMORY.md's
      # `ghas_clippy_extra_lints.md` flagged.
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      # `-D warnings` for rustdoc catches broken intra-doc links and
      # missing-doc warnings before docs.rs renders a broken page.
      # `--no-deps` skips dep docs (they're not our problem); `--workspace`
      # + `--all-features` mirrors the clippy surface.
      - name: Build docs (-D warnings)
        run: cargo doc --workspace --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  # Coverage runs on Linux only — coverage is a measurement, not a
  # correctness check, and platform-specific differences in test
  # coverage are vanishingly unlikely. Linux is also the fastest
  # llvm-cov target. Result is uploaded as a workflow artifact for
  # local inspection; no third-party coverage SaaS integration.
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cargo-llvm-cov
      # `--no-report` collects instrumented coverage data without
      # emitting a report yet; subsequent `report` invocations format
      # the same data multiple ways without rerunning the test suite.
      - name: Collect coverage
        run: cargo llvm-cov --workspace --all-features --no-report
      - name: Generate reports
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --html
      - name: Coverage summary
        shell: bash
        run: |
          {
            echo "### Coverage"
            echo ""
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      # Floor measured at 87.50% line coverage on this branch's CI run
      # (matches `cargo llvm-cov report --summary-only` and lcov LH/LF
      # headers). 85 gives a ~2.5pp buffer; tighten only when a stable
      # wave of new tests raises the measured number cleanly.
      - name: Enforce coverage floor (lines)
        run: cargo llvm-cov report --fail-under-lines 85
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            lcov.info
            target/llvm-cov/html/
          retention-days: 30

  # MSRV (Minimum Supported Rust Version) compile check. Pinned to the
  # `rust-version` declared in Cargo.toml so a dep update that silently
  # raises MSRV gets caught here rather than by a downstream user. Uses
  # `cargo check` (not test) because the goal is "does this compile on
  # 1.88"; behavior testing happens on stable.
  #
  # Drops `--workspace` so the check respects `default-members` in
  # Cargo.toml — which excludes `paksmith-fixture-gen` and its
  # `repak` git dependency. That dep doesn't declare a `rust-version`
  # and its transitives could push MSRV above 1.88 for reasons
  # unrelated to paksmith's own code.
  msrv:
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: "1.88"
      - run: cargo check --all-features

  # Nightly toolchain compile check. Catches future-rust regressions
  # (lints we'll have to fix, deprecations, soundness changes) weeks
  # before they hit stable. `continue-on-error: true` so a nightly
  # break doesn't block PRs — the signal is "look at this", not "fix
  # before merge."
  #
  # RUSTFLAGS cleared because nightly routinely adds new warnings that
  # `-D warnings` would escalate to errors, defeating the informational
  # purpose.
  nightly:
    name: Nightly toolchain (informational)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 20
    continue-on-error: true
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - run: cargo check --workspace --all-features

  # `cargo minimal-versions` verifies the crate compiles against the
  # oldest semver-compatible version of every dep. Catches our direct
  # deps that under-declare their version constraints (e.g. declaring
  # `serde = "1"` but using a 1.0.97+ API).
  #
  # `--direct` (passed below) restricts the minimization to our direct
  # dependencies, skipping transitive ones. Transitive under-
  # declarations are not our problem to fix (e.g. sharded-slab 0.1.1
  # under-declaring `lazy_static`) and would otherwise produce noisy
  # red runs we can't act on.
  #
  # Requires nightly Cargo for `-Z direct-minimal-versions`; the
  # cargo-minimal-versions wrapper does the toolchain dance internally
  # (uses nightly to resolve the lockfile, stable for the check).
  # RUSTFLAGS cleared because warnings on old dep versions would
  # escalate to errors under `-D warnings`.
  minimal_versions:
    name: Minimal versions
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust # stable + macOS proxy workaround
      # cargo-minimal-versions internally invokes nightly via `rustup run
      # nightly cargo` for `-Z minimal-versions` lockfile resolution, then
      # falls back to stable for the actual check. So nightly only needs
      # to be registered with rustup — no need to install a second
      # toolchain via a pinned third-party action.
      - run: rustup toolchain install nightly --profile minimal --no-self-update
      # cargo-minimal-versions delegates the actual check phase to
      # cargo-hack (its sister tool by taiki-e), so both need to be on
      # PATH. Comma-separated tool list installs both via one action call.
      - uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cargo-minimal-versions,cargo-hack
      - run: cargo minimal-versions check --direct --all-features

  # PR-time `cargo fuzz build` check. The fuzz workflow itself runs
  # scheduled-only (4am UTC) — without this gate, a PR that breaks the
  # harness (e.g. renames PakReader::open, drops verify(), changes a
  # signature the harness uses) merges green and surfaces yellow at
  # 4am the next night. This 30-60s build-only check catches that
  # before merge. `cargo fuzz build` exits 0 if the harness compiles,
  # so this is a real gate (no continue-on-error).
  #
  # Gated on `needs.changes.outputs.code == 'true'` like the other
  # Rust jobs; the paths-filter `code` glob already includes
  # `fuzz/**` and `crates/**`, so docs-only PRs correctly skip.
  fuzz_build:
    name: Fuzz harness build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    timeout-minutes: 15
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-rust
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2.78.0
        with:
          tool: cargo-fuzz
      - name: Build fuzz harness
        working-directory: fuzz
        run: cargo fuzz build fuzz_pak_open
