[package]
name = "paksmith-core"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Core library for parsing and extracting Unreal Engine game assets"

[dependencies]
thiserror.workspace = true
serde.workspace = true
byteorder.workspace = true
tracing.workspace = true
flate2.workspace = true
sha1.workspace = true

[dev-dependencies]
proptest = "1"
tempfile = "3"

# Cross-parser fixture generation (uses the trumank/repak git dep) and
# the Layer 1+2 cross-validation tests live in the sibling
# `paksmith-fixture-gen` crate, which is excluded from workspace
# default-members. This keeps the main library build free of any git-
# sourced dependency. See workspace Cargo.toml + #20 for rationale.

[[example]]
name = "generate_fixtures"
path = "../../tests/fixtures/generate.rs"

[lints]
workspace = true
