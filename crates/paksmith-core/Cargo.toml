[package]
name = "paksmith-core"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "Core library for parsing and extracting Unreal Engine game assets"

[dependencies]
thiserror.workspace = true
serde.workspace = true
serde_json.workspace = true
byteorder.workspace = true
tracing.workspace = true
flate2.workspace = true
sha1.workspace = true

[dev-dependencies]
proptest = "1"
tempfile = "3"
# Third-party UE pak reader/writer (trumank/repak). Used as an
# independent implementation for cross-parser ground-truth fixtures
# (#14) — dev-only, never in the main build path. License: MIT/Apache.
#
# Pinned to git because the `repak` name on crates.io is squatted by an
# unrelated abandoned crate (`berkus/repak`); trumank's actual UE pak
# library only ships via GitHub. SHA pinned to the v0.2.3 tag's commit
# so a force-push to that tag can't silently change what we test
# against.
repak = { version = "0.2", git = "https://github.com/trumank/repak", rev = "e215472c51db", default-features = false }

[[example]]
name = "generate_fixtures"
path = "../../tests/fixtures/generate.rs"

[[example]]
name = "gen_pak_fixtures"
path = "../../tests/fixtures/gen_pak_fixtures.rs"

[lints]
workspace = true
