[workspace]
resolver = "2"
members = ["crates/*"]
# `paksmith-fixture-gen` is intentionally excluded from default-members so
# routine `cargo build` / `cargo test` from the repo root never has to
# resolve its `repak` git dependency. CI uses `--workspace` to include it;
# fixture regeneration is `cargo run -p paksmith-fixture-gen`. See
# crates/paksmith-fixture-gen/Cargo.toml for full rationale (closes #20).
default-members = ["crates/paksmith-core", "crates/paksmith-cli", "crates/paksmith-gui"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
rust-version = "1.85"

[workspace.dependencies]
thiserror = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
byteorder = "1"
tracing = "0.1"
flate2 = "1"
sha1 = "0.10"

[workspace.lints.rust]
unsafe_code = "deny"
missing_docs = "warn"
unused_results = "warn"

[workspace.lints.clippy]
all = { level = "deny", priority = -1 }
pedantic = { level = "warn", priority = -1 }
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
doc_markdown = "allow"
missing_errors_doc = "allow"
module_name_repetitions = "allow"
must_use_candidate = "allow"
used_underscore_binding = "allow"
