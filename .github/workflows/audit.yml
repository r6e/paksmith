name: Security Audit

on:
  schedule:
    - cron: "0 7 * * *"
  push:
    paths:
      - "**/Cargo.lock"
      - "**/Cargo.toml"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
