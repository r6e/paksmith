name: Clippy SARIF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  security-events: write

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install SARIF tools
        run: cargo install clippy-sarif sarif-fmt

      - name: Run Clippy with SARIF output
        # `--all-features` activates the `__test_utils` feature so
        # lints in the test-utils surface (`crates/paksmith-core/src/testing/`)
        # are scanned too. Issue #89 originally only hardened the
        # required Lint job in `ci.yml`; this gate is what actually
        # feeds GHAS code-scanning, so it needed the same treatment
        # for convergence — without it, the GHAS panel silently
        # missed the gated library code.
        #
        # No command injection surface: the command line is fully
        # static (no `${{ github.event.* }}` interpolation), and
        # `cargo clippy` only reads source files from the checked-out
        # tree.
        run: >
          cargo clippy --workspace --all-targets --all-features --message-format=json
          | clippy-sarif
          | tee results.sarif
          | sarif-fmt
        continue-on-error: true

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: results.sarif
          wait-for-processing: true
