name: Feature request
description: Propose a new capability or enhancement.
title: "feat: <one-line summary>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today that you want to do? What's the use case?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should paksmith do? Sketch the UX (CLI flag, library API, GUI element).

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is preferred.

  - type: textarea
    id: scope
    attributes:
      label: Phase / scope
      description: If this maps to a planned phase from `ARCHITECTURE.md` or `docs/`, call it out (e.g. "Phase 5 game profiles", "Phase 8 IoStore").

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues for duplicates.
          required: true
